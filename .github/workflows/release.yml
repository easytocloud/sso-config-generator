name: Release
on:
  push:
    branches:
      - main

# Serialize releases so two quick pushes to main can't race each other.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write        # semantic-release pushes the version/changelog commit and tag
      issues: write          # @semantic-release/github comments on released issues
      pull-requests: write   # @semantic-release/github comments on released PRs
      id-token: write        # PyPI Trusted Publishing (OIDC)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          # semantic-release bumps version.py + pyproject.toml (via the exec plugin),
          # updates CHANGELOG.md, commits + tags, and publishes the GitHub release —
          # all in one atomic commit, so the tag matches the shipped version.
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/exec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        if: steps.semantic.outputs.new_release_published == 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
